version: 2

builds:
  - id: darwin
    main: .
    binary: nownow
    ldflags:
      - -s -w -X github.com/nownow-labs/nownow/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    hooks:
      pre:
        - cmd: swiftc -O -target {{ if eq .Arch "amd64" }}x86_64{{ else }}arm64{{ end }}-apple-macos12 -o dist/{{ .Target }}/nowplaying-helper internal/detect/nowplaying/main.swift

  - id: cross
    main: .
    binary: nownow
    ldflags:
      - -s -w -X github.com/nownow-labs/nownow/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: darwin
    builds: [darwin]
    formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: dist/{{ .Target }}/nowplaying-helper
        strip_parent: true
        info:
          mode: 0755

  - id: cross
    builds: [cross]
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
