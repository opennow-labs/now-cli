version: 2

builds:
  - id: darwin
    main: .
    binary: nownow
    ldflags:
      - -s -w -X github.com/nownow-labs/nownow/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - id: cross
    main: .
    binary: nownow
    ldflags:
      - -s -w -X github.com/nownow-labs/nownow/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - builds: [darwin, cross]
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
